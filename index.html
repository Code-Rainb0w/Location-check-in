<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check In</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="app-shell">
        <section class="glass-card">

            <div class="hud-line"></div>

            <h1>
                Check In <span class="heart">♥</span>
            </h1>

            <textarea 
                id="message"
                placeholder="Send location and optional message..."
            ></textarea>

            <div class="radar">
                <div class="radar-dot"></div>
            </div>

            <h2>Ready to transmit</h2>

            <p class="subtext">
                Your secure location will be sent to your emergency contact.
            </p>

            <button id="sendLocationBtn" aria-label="Transmit Location"></button>

            <p id="statusMessage">Secure. Private. Encrypted.</p>

        </section>
    </main>

    <script src="script.js?v=3"></script>
</body>
</html>
